name: Update today.json

on:
  schedule:
    # 매시간 정각마다 실행
    - cron: '0 * * * *'
  workflow_dispatch: {}   # Actions 탭에서 수동으로 즉시 실행 가능

permissions:
  contents: write

jobs:
  update-today:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          # 자동 커밋 도구가 정상 작동하기 위해 전체 이력이 필요합니다.
          fetch-depth: 0 

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # pip 의존성 캐싱으로 속도 최적화

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: today.json 생성
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python update_today.py

      # 가장 안전한 커밋&푸시 전용 공식 액션을 사용합니다. (오류 원천 차단)
      - name: 변경사항 자동 커밋 및 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: today.json 자동 업데이트"
          file_pattern: 'today.json'
