name: Update today.json

on:
  schedule:
    # 매시간 정각마다 실행 (필요에 따라 주기 변경 가능)
    - cron: '0 * * * *'
  workflow_dispatch: {}   # Actions 탭에서 언제든 수동으로 실행 가능

permissions:
  contents: write

jobs:
  update-today:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          # rebase나 push 충돌 방지를 위해 전체 이력을 가져옵니다.
          fetch-depth: 0 

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # pip 의존성 캐싱으로 실행 속도 업!

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: today.json 생성
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python update_today.py

      - name: 변경사항 커밋 & 안전하게 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add today.json
          
          # 변경사항이 있는지 확인 후 커밋 진행
          if git diff --quiet --cached; then
            echo "변경사항이 없어 커밋을 건너뜁니다."
          else
            git commit -m "chore: today.json 자동 업데이트"
            
            # 푸시 실패 방지를 위한 fetch 및 rebase 전략 적용
            echo "원격 저장소의 최신 상태를 반영합니다..."
            git fetch origin main
            git rebase origin/main
            
            # 최종 안전 푸시
            git push origin HEAD:main
          fi
