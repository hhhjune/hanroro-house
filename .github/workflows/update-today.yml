name: Update today.json

on:
  schedule:
    # 매시 정각마다 실행 (UTC 기준)
    - cron: '0 * * * *'
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  update-today:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true   # 푸시 권한 유지

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: today.json 생성
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python update_today.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add today.json
          git diff --quiet --cached || git commit -m "chore: today.json 자동 업데이트"
          git push origin HEAD:main


