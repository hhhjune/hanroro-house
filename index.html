<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한로로 | 로켓단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EDE8DC;
    --paper-fold: #E1DAC8;
    --paper-deep: #D8CFB8;
    --ink: #2A2724;
    --ink-soft: #58524A;
    --moss: #5F6F52;
    --moss-deep: #47543C;
    --berry: #9C4A5C;
    --rule: #C7BFA9;
    --rule-strong: #ABA189;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  body{\n    margin:0;\n    background:var(--paper);\n    color:var(--ink);\n    font-family:'Noto Sans KR', sans-serif;\n    font-weight:300;\n    line-height:1.6;\n    word-break:keep-all;\n  }

  /* 네비게이션, 헤더 및 전반적인 레이아웃 스타일 구조 유지 */
  nav {
    position: sticky;
    top: 0;
    background: rgba(237, 232, 220, 0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--rule);
    z-index: 100;
    padding: 0.8rem 1rem;
  }
  .nav-container {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .nav-logo {
    font-family: 'Gowun Batang', serif;
    font-weight: 700;
    font-size: 1.2rem;
    color: var(--ink);
    text-decoration: none;
  }
  .nav-links a {
    margin-left: 1rem;
    color: var(--ink-soft);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
  }
  .nav-links a:hover {
    color: var(--berry);
  }

  header {
    padding: 4rem 1rem 2rem;
    text-align: center;
    border-bottom: 1px double var(--rule-strong);
  }
  .header-title {
    font-family: 'Gowun Batang', serif;
    font-size: 2.5rem;
    margin: 0 0 1rem;
  }
  .header-sub {
    color: var(--ink-soft);
    margin: 0;
  }

  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  section {
    margin-bottom: 4rem;
  }

  .section-title {
    font-family: 'Gowun Batang', serif;
    font-size: 1.8rem;
    border-bottom: 1px solid var(--rule-strong);
    padding-bottom: 0.5rem;
    margin-bottom: 1.5rem;
  }

  /* 2단 그리드 레이아웃 (인스타가 빠져서 유튜브와 틱톡 2개 영역만 배치) */
  .today-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
  }
  @media (max-width: 768px) {
    .today-grid {
      grid-template-columns: 1fr;
    }
  }

  .today-card {
    background: #fbf9f4;
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 1.5rem;
    box-shadow: 0 4px 10px rgba(0,0,0,0.03);
  }

  .today-card h3 {
    margin-top: 0;
    font-family: 'Gowun Batang', serif;
    font-size: 1.3rem;
    color: var(--moss-deep);
    border-bottom: 1px dashed var(--rule);
    padding-bottom: 0.5rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .today-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .today-item {
    padding: 0.7rem 0;
    border-bottom: 1px solid #f1eee7;
    font-size: 0.95rem;
  }
  .today-item:last-child {
    border-bottom: none;
  }

  .today-item a {
    color: var(--ink);
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
  }

  .today-item a:hover {
    color: var(--berry);
  }

  .today-item .item-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .today-item .item-date {
    font-size: 0.8rem;
    color: var(--ink-soft);
    font-family: monospace;
  }

  /* 우측 하단 또는 인스타 바로가기 전용 링크 스타일 */
  .insta-banner {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #fdfbf7, #f7f1e5);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 1.5rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    margin-top: 1rem;
  }

  .insta-banner p {
    margin: 0;
    font-size: 0.95rem;
    color: var(--ink-soft);
  }

  .insta-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--berry);
    color: #fff;
    text-decoration: none;
    padding: 0.6rem 1.2rem;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 500;
    transition: background 0.2s, transform 0.2s;
  }

  .insta-btn:hover {
    background: #83394a;
    transform: translateY(-1px);
  }

  .updated-time {
    font-size: 0.8rem;
    color: var(--ink-soft);
    text-align: right;
    margin-top: 1rem;
  }

  /* 기존 캘린더 영역 스타일 */
  .calendar-month {
    font-family: 'Gowun Batang', serif;
    font-size: 1.2rem;
    color: var(--moss);
    font-weight: bold;
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
  }
  .calendar-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .cal-item {
    border-bottom: 1px solid var(--rule);
    padding: 0.8rem 0;
  }
  .cal-item-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cal-date {
    font-family: monospace;
    font-weight: bold;
    color: var(--berry);
    width: 80px;
  }
  .cal-title {
    flex: 1;
    font-weight: 500;
  }
  .cal-detail-btn {
    background: none;
    border: 1px solid var(--rule-strong);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
  }
  .cal-detail {
    display: none;
    margin-top: 0.5rem;
    padding: 0.8rem;
    background: var(--paper-fold);
    border-radius: 4px;
    font-size: 0.9rem;
  }
  .cal-detail p { margin: 0 0 0.5rem 0; }
  .mv-links { display: flex; gap: 0.5rem; }
  .mv-link {
    display: inline-block;
    font-size: 0.8rem;
    color: var(--moss-deep);
    text-decoration: underline;
  }

  footer {
    text-align: center;
    padding: 3rem 1rem;
    border-top: 1px solid var(--rule);
    color: var(--ink-soft);
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<nav>
  <div class="nav-container">
    <a href="#" class="nav-logo">한로로</a>
    <div class="nav-links">
      <a href="#today">오늘, 한로로는</a>
      <a href="#schedule">일정</a>
    </div>
  </div>
</nav>

<header>
  <h1 class="header-title">한로로 HANRORO</h1>
  <p class="header-sub">공식 소식 및 일정 아카이브</p>
</header>

<main>
  <section id="today">
    <h2 class="section-title">오늘, 한로로는</h2>
    
    <div class="today-grid">
      <div class="today-card">
        <h3>📺 유튜브 최신 영상</h3>
        <ul class="today-list" id="youtube-list">
          <li class="today-item">불러오는 중입니다...</li>
        </ul>
      </div>

      <div class="today-card">
        <h3>🎵 틱톡 최신 영상</h3>
        <ul class="today-list" id="tiktok-list">
          <li class="today-item">불러오는 중입니다...</li>
        </ul>
      </div>

      <div class="insta-banner">
        <p>📸 실시간 일상과 가장 빠른 소식은 한로로 공식 인스타그램에서 만나보세요!</p>
        <a href="https://www.instagram.com/hanr0r0/" target="_blank" rel="noopener" class="insta-btn">
          <span>@hanr0r0 공식 인스타그램 바로가기</span>
        </a>
      </div>
    </div>
    <div class="updated-time" id="updated-time"></div>
  </section>

  <section id="schedule">
    <h2 class="section-title">일정</h2>
    <div id="calendar-container">
      </div>
  </section>
</main>

<footer>
  <p>&copy; 2026 한로로 팬페이지 Rocketdan. All rights reserved.</p>
</footer>

<script>
  // 1. "오늘, 한로로는" 데이터(today.json) 불러오기 및 렌더링
  fetch('./today.json')
    .then(res => {
      if(!res.ok) throw new Error('데이터를 가져올 수 없습니다.');
      return res.json();
    })
    .then(data => {
      // 업데이트 시간 표시
      if(data.updated_at) {
        const d = new Date(data.updated_at);
        document.getElementById('updated-time').innerText = `최근 업데이트: ${d.toLocaleString('ko-KR')}`;
      }

      // 1) 유튜브 데이터 매핑
      const ytList = document.getElementById('youtube-list');
      if (data.youtube && data.youtube.length > 0) {
        ytList.innerHTML = data.youtube.map(item => `
          <li class="today-item">
            <a href="${item.link}" target="_blank" rel="noopener">
              <span class="item-title">${item.title}</span>
              <span class="item-date">${item.date || ''}</span>
            </a>
          </li>
        `).join('');
      } else {
        ytList.innerHTML = '<li class="today-item">최신 영상을 불러오지 못했어요.</li>';
      }

      // 2) 틱톡 데이터 매핑
      const ttList = document.getElementById('tiktok-list');
      if (data.tiktok && data.tiktok.length > 0) {
        ttList.innerHTML = data.tiktok.map(item => `
          <li class="today-item">
            <a href="${item.link}" target="_blank" rel="noopener">
              <span class="item-title">${item.title}</span>
              <span class="item-date">${item.date || ''}</span>
            </a>
          </li>
        `).join('');
      } else {
        ttList.innerHTML = '<li class="today-item">최신 영상을 불러오지 못했어요.</li>';
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById('youtube-list').innerHTML = '<li class="today-item">소식을 불러오는 데 실패했습니다.</li>';
      document.getElementById('tiktok-list').innerHTML = '<li class="today-item">소식을 불러오는 데 실패했습니다.</li>';
    });

  // 2. 임시 일정 데이터 (수정하여 활용 가능)
  const events = [
    {
      date: "2026-06-01",
      title: "서울재즈페스티벌 2026",
      venue: "올림픽공원 88잔디마당"
    }
  ];

  // 일정 렌더링 로직
  const container = document.getElementById('calendar-container');
  const byMonth = {};

  events
    .sort((a,b) => new Date(a.date) - new Date(b.date))
    .forEach(ev => {
      const d = new Date(ev.date);
      const key = `${d.getFullYear()}년 ${d.getMonth() + 1}월`;
      const dayLabel = ev.dateEnd
        ? `${d.getDate()}~${new Date(ev.dateEnd).getDate()}일`
        : `${d.getDate()}일`;
      if(!byMonth[key]) byMonth[key] = [];
      byMonth[key].push({ ...ev, dayLabel });
    });

  container.innerHTML = Object.keys(byMonth).map(monthKey => `
    <div class="calendar-month">📅 ${monthKey}</div>
    <ul class="calendar-list">
      ${byMonth[monthKey].map(ev => `
        <li class="cal-item">
          <div class="cal-item-head">
            <span class="cal-date">${ev.dayLabel}</span>
            <span class="cal-title">${ev.title}</span>
            <button class="cal-detail-btn">상세보기</button>
          </div>
          <div class="cal-detail">
            <p>장소 · ${ev.venue}</p>
            <div class="mv-links">
              <a class="mv-link" href="https://maps.google.com/?q=${encodeURIComponent(ev.venue)}" target="_blank" rel="noopener">지도 보기</a>
            </div>
          </div>
        </li>
      `).join('')}
    </ul>
  `).join('');

  container.querySelectorAll('.cal-detail-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const detail = btn.closest('.cal-item').querySelector('.cal-detail');
      detail.style.display = detail.style.display === 'block' ? 'none' : 'block';
    });
  });
</script>
</body>
</html>
